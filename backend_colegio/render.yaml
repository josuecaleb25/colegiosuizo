services:
  - type: web
    name: ieperuanosuizo-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend_colegio && gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: ieperuanosuizo-db
          property: connectionString
    
databases:
  - name: ieperuanosuizo-db
    databaseName: ieperuanosuizo
    user: ieperuanosuizo
